<section class="pollSection">
  <div class="okraPoll" id="okramarket" style="scroll-margin-top: 1em;">
    <h2>
      <img class="wiggleOkra okraInline" src="{{ '/assets/img/Okr-white.png' | relative_url }}" alt=""/>
      <span class="">OKRAMARKET</span>
      <img class="wiggleOkra okraInline" src="{{ '/assets/img/Okr-white.png' | relative_url }}" alt=""/>
    </h2>
    <p class="pollIntro">
      📈 The galaxy&rsquo;s #1 prediction market &mdash; several calls open at once!<br/>
      <small>*not financial advice &middot; wager <strong>credits</strong> in chat &middot; or cast a <strong>free</strong> community vote here &middot; positions settle when a mod calls it</small>
    </p>
    <div id="marketGrid" class="marketGrid">Consulting the cosmos&hellip;</div>
    <p id="marketNote" class="pollNote"></p>
  </div>
</section>

<!-- ===== OKRAMARKET — concurrent binary YES/NO prediction markets =====
     Reads markets/open/<id> (Admin-written by kennyBot) and renders one card per
     live market: the credit-staked parimutuel odds (read-only — viewers WAGER in
     Twitch chat with !bet <#> <yes|no> <amount>) PLUS a free community YES/NO vote.
     The community vote is anonymous and stakes NO credits; it writes to the open
     polls/market-<id> path (a plain sentiment tally, separate from the credit
     pools). Credits can't be minted client-side — the money side is read-only. -->
<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyC3aWINWIBQ4rM_Ua2EOtr_Tw9rGhYdoS0",
    authDomain: "okrafans.firebaseapp.com",
    databaseURL: "https://okrafans-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "okrafans",
    storageBucket: "okrafans.firebasestorage.app",
    messagingSenderId: "56095817168",
    appId: "1:56095817168:web:6355809cae65797ca28dd5"
  };

  const grid = document.getElementById("marketGrid");
  const note = document.getElementById("marketNote");
  const num  = (n) => (n || 0).toLocaleString("en-US");
  const esc  = (s) => { const d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML; };
  const STATUS = { open: "🟢 OPEN — place your bets!", closed: "🔒 BETTING CLOSED — awaiting the call" };

  let dbMod = null;
  let db = null;
  const cards = new Map(); // market id -> card controller

  function optionRows(m){
    const keys  = m.optionOrder || ["yes", "no"];
    const total = m.totalPool || keys.reduce((s, k) => s + ((m.pools && m.pools[k]) || 0), 0);
    return keys.map((k) => {
      const o    = (m.options && m.options[k]) || {};
      const pool = (m.pools && m.pools[k]) || 0;
      const pct  = total ? Math.round(pool / total * 100) : 0;
      const mult = pool > 0 ? (total / pool) : 0; // parimutuel payout per credit if this side wins
      return '<div class="mktOption mkt' + (k === "yes" ? "Yes" : "No") + '">' +
          '<div class="mktOptTop">' +
            '<span class="mktOptName">' + esc(o.label || k) + '</span>' +
            '<span class="mktOptMult">' + (pool > 0 ? ('&times;' + mult.toFixed(2)) : '&mdash;') + '</span>' +
          '</div>' +
          '<div class="mktBar"><div class="mktBarFill" style="width:' + pct + '%"></div></div>' +
          '<div class="mktOptFoot">' + num(pool) + ' credits &middot; ' + pct + '%</div>' +
        '</div>';
    }).join("");
  }

  function votedKey(c){ return "okramarket_voted_" + c.pollId; }

  function renderVote(c, v){
    const yes = (v && v.yes) || 0;
    const no  = (v && v.no)  || 0;
    const total = yes + no;
    const yPct = total ? Math.round(yes / total * 100) : 0;
    const nPct = total ? 100 - yPct : 0;
    c.results.innerHTML =
      '<div class="pollBar">' +
        '<div class="pollBarYes" style="width:' + yPct + '%">' + (yPct > 12 ? yPct + '%' : '') + '</div>' +
        '<div class="pollBarNo"  style="width:' + nPct + '%">' + (nPct > 12 ? nPct + '%' : '') + '</div>' +
      '</div>' +
      '<div class="cvTally">✅ ' + yes + ' &nbsp; ❌ ' + no + ' &nbsp;<span>(' + total + ' votes)</span></div>';
  }

  function updateVoteButtons(c){
    const voted = localStorage.getItem(votedKey(c));
    const canVote = c.open && !voted;
    c.yesBtn.disabled = !canVote;
    c.noBtn.disabled  = !canVote;
    if (voted)        c.voteNote.textContent = "You voted " + voted.toUpperCase() + " here. No take-backs. 🌱";
    else if (!c.open) c.voteNote.textContent = "Voting closed on this one.";
    else              c.voteNote.textContent = "";
  }

  async function castVote(c, choice){
    if (!c.open) return;
    const key = votedKey(c);
    if (localStorage.getItem(key)) return;
    localStorage.setItem(key, choice);
    c.yesBtn.disabled = true; c.noBtn.disabled = true;
    c.voteNote.textContent = "Thanks — you voted " + choice.toUpperCase() + "! 🌟";
    try {
      await dbMod.runTransaction(dbMod.ref(db, "polls/" + c.pollId + "/" + choice), (cur) => (cur || 0) + 1);
    } catch (e) {
      localStorage.removeItem(key);
      c.voteNote.textContent = "Vote didn't take — try again in a moment.";
      updateVoteButtons(c);
    }
  }

  function buildCard(){
    const el = document.createElement("div");
    el.className = "mktCard";
    el.innerHTML =
      '<p class="mktQuestion"></p>' +
      '<p class="mktStatus"></p>' +
      '<div class="mktOptions"></div>' +
      '<p class="mktMeta"></p>' +
      '<p class="mktCta"></p>' +
      '<div class="mktVote">' +
        '<p class="cvTitle">🗳️ Community call <span class="cvFree">— free vote, no credits</span></p>' +
        '<div class="cvBtns"><button class="pollBtn cvYes">YES</button><button class="pollBtn cvNo">NO</button></div>' +
        '<div class="cvResults"></div>' +
        '<p class="cvNote pollNote"></p>' +
      '</div>';
    const c = {
      el,
      q:        el.querySelector(".mktQuestion"),
      status:   el.querySelector(".mktStatus"),
      options:  el.querySelector(".mktOptions"),
      meta:     el.querySelector(".mktMeta"),
      cta:      el.querySelector(".mktCta"),
      yesBtn:   el.querySelector(".cvYes"),
      noBtn:    el.querySelector(".cvNo"),
      results:  el.querySelector(".cvResults"),
      voteNote: el.querySelector(".cvNote"),
      pollId:   null,
      unsubPoll: null,
      open:     false,
    };
    c.yesBtn.addEventListener("click", () => castVote(c, "yes"));
    c.noBtn.addEventListener("click",  () => castVote(c, "no"));
    return c;
  }

  function updateCard(c, m){
    c.q.textContent = m.question || "";
    c.status.textContent = STATUS[m.status] || m.status;
    c.status.className = "mktStatus mkt-" + m.status;
    c.options.innerHTML = optionRows(m);
    c.meta.innerHTML = '💰 pool ' + num(m.totalPool) + ' credits &middot; ' + num(m.betCount) + ' bettors';
    c.open = m.status === "open";
    c.cta.innerHTML = m.status === "open"
      ? 'Wager in <a href="https://www.twitch.tv/nikkibreanne" target="_blank" rel="noopener noreferrer">chat</a>: <code>!bet ' + esc(m.id) + ' &lt;yes|no&gt; &lt;amount&gt;</code>'
      : 'Betting closed — awaiting the mod&rsquo;s call.';

    const pollId = "market-" + m.id;
    if (c.pollId !== pollId) {
      c.pollId = pollId;
      if (c.unsubPoll) { c.unsubPoll(); c.unsubPoll = null; }
      c.unsubPoll = dbMod.onValue(dbMod.ref(db, "polls/" + pollId), (snap) => renderVote(c, snap.val()));
    }
    updateVoteButtons(c);
  }

  function teardown(c){ if (c.unsubPoll) c.unsubPoll(); c.el.remove(); }

  function renderEmpty(){
    for (const [, c] of cards) { if (c.unsubPoll) c.unsubPoll(); }
    cards.clear();
    grid.innerHTML = '<p class="raidEmpty">🌌 No markets live right now — a fresh line drops when Nikki (or chat) calls one. Suggest yours in chat: <code>!market suggest &lt;yes/no question&gt;</code></p>';
  }

  function onMarkets(val){
    note.textContent = "";
    const markets = Object.values(val || {}).filter(Boolean).sort((a, b) => a.id - b.id);
    if (!markets.length) { renderEmpty(); return; }
    if (!cards.size) grid.innerHTML = ""; // clear the loading/empty placeholder

    const seen = new Set();
    for (const m of markets) {
      seen.add(m.id);
      let c = cards.get(m.id);
      if (!c) { c = buildCard(); cards.set(m.id, c); grid.appendChild(c.el); }
      updateCard(c, m);
    }
    for (const [id, c] of cards) { if (!seen.has(id)) { teardown(c); cards.delete(id); } }
  }

  try {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    dbMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
    db = dbMod.getDatabase(appMod.initializeApp(firebaseConfig));
    if (new URLSearchParams(location.search).has("dev")) {
      try { dbMod.connectDatabaseEmulator(db, "127.0.0.1", 9000); } catch (e) {}
    }
    dbMod.onValue(dbMod.ref(db, "markets/open"), (snap) => onMarkets(snap.val()),
      () => { grid.innerHTML = '<p class="raidEmpty">The market is napping. Refresh to try again.</p>'; });
  } catch (e) {
    grid.innerHTML = '<p class="raidEmpty">The market is offline right now.</p>';
  }
</script>
