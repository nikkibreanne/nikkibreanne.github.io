- text: "🎂 Freshly harvested every June 14th — and, for the record, a perpetual 25."
- text: "Ghost, her mini Pomeranian, is the actual star of the channel. Nikki just works here. 🐾"
- text: "Her heart belongs to fictional men: Link, Leon Kennedy, and a rotating roster of anime boyfriends. 3D men could never. 💘"
- text: "Wayne the delivery robot is the one that got away. She's still not over it. 🤖💔"
- text: "Yes, she has a foot phone. Yes, it is a phone shaped like a foot. No further questions. 📞🦶"
- text: "Certified WoW Horde raider — Mythic+ is her cardio. Would uninstall before she'd roll Alliance. Who even plays Alliance? For the Horde, bby. 💀"
- text: "Her subscribers are Sith Lords. She's a clumsy ninja with Vader style. It all checks out."
- text: "A real-deal LA actress — turns up on How I Met Your Mother, Workaholics, and in films with Bruce Willis."
- text: "Raised by a Nintendo 64. Ocarina of Time and Majora's Mask did most of the parenting."
- text: "Space-obsessed science geek, anime nerd, ex-NCAA golfer, and RC-car menace. The range is genuinely unhinged."
- text: "Runs on horror and stealth in equal measure — Resident Evil screams and Metal Gear sneaking (and yes, more Leon)."
- text: "Will cosplay Harley Quinn at the faintest provocation."
