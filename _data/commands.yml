# kennyBot command reference — rendered on /commands/ via _includes/commands.html
# and linked from chat by !kennycommands. Keep in sync with the bot's command
# registry (kennyBot/src/commands/registry.js). `sub: true` = subscriber-only;
# a group with `mod: true` = moderator commands. desc may contain simple HTML
# (use single-quoted attributes so the YAML stays double-quoted).
- group: "Your raider"
  blurb: "Grow a little hero in chat and gear it up."
  commands:
    - cmd: "!create"
      args: "<class>"
      sub: true
      desc: "Create your raider. Pick one class: <strong>Guardian</strong> (tank), <strong>Mender</strong> (healer), <strong>Berserker</strong>, <strong>Arcanist</strong>, or <strong>Ranger</strong> (all damage). Comes with starter gear."
    - cmd: "!char"
      aliases: "!me"
      desc: "View your character — class, level, EXP, rating, combat stats, and what you have equipped."
    - cmd: "!bag"
      aliases: "!inventory, !inv"
      desc: "See your unequipped loot — everything grabbed but not yet worn."
    - cmd: "!equip"
      args: "<item|#>"
      desc: "Wear an item from your bag — by its <code>!bag</code> number or name. It slots into weapon, armor, or trinket automatically."
    - cmd: "!unequip"
      args: "<slot|item>"
      desc: "Move a slot (weapon / armor / trinket) or named item back into your bag."
    - cmd: "!offer"
      args: "@user <item|#> [+ credits]"
      aliases: "!gift"
      desc: "GIVE an item and/or credits to another player — one-way, nothing owed back. Put up an item by its <code>!bag</code> number or name (and optionally credits after a <code>+</code>) — e.g. <code>!offer @okrafan 2</code> or <code>!offer @okrafan 2 + 50</code>. They reply <code>!offer accept</code> or <code>!offer decline</code>. Perfect for handing a drop to the raider it suits."
    - cmd: "!trade"
      args: "@user <item|#> [+ credits]"
      desc: "Propose a real SWAP. You put up an item (by <code>!bag</code> number or name) and/or credits; the other player must put something up in return with <code>!trade counter &lt;their item # or credits&gt;</code> before it can go through — a bare <code>!trade accept</code> with nothing on their side is refused. Countering flips it back to you to <code>!trade accept</code>, counter again, or <code>!trade decline</code>. Each side only stakes from its own bag, offers expire after 5 minutes, and the swap is all-or-nothing. (Just want to give something away? Use <code>!offer</code>.)"

- group: "Loot & raids"
  blurb: "Chat loot drops, the weekly boss, and the leaderboard."
  commands:
    - cmd: "!grab"
      aliases: "!loot"
      sub: true
      desc: "Enter the drawing for the active loot drop. One winner is drawn when the window closes and gets the item. 🎲"
    - cmd: "!muster"
      sub_note: "subs to enlist"
      desc: "During the signup window, enlist your hero in this week's raid (subscribers). Any time, it reports the current raid status and links you to the action."
    - cmd: "!top"
      args: "[damage]"
      desc: "The season leaderboard — the patch's top 5 hardest hitters."

- group: "Credits & the OKRAMARKET"
  blurb: "Fun-money you earn by hanging out, then wager on predictions. No pay-to-win — credits can't be bought, only earned."
  commands:
    - cmd: "!credits"
      aliases: "!points, !bal"
      desc: "Check your credit balance."
    - cmd: "!daily"
      desc: "Claim your daily credit allowance (your first-ever claim also drops a starter grubstake)."
    - cmd: "!bet"
      args: "<market#> <yes|no> <amount>"
      aliases: "!wager"
      desc: "Wager credits YES or NO on a market (the number targets it — see <code>!market</code>). You back one side; betting again on it adds to your stake. Winners split the whole pool proportional to their stake (parimutuel — no rake). If only one market is open you can skip the number: <code>!bet yes 100</code>."
    - cmd: "!market"
      desc: "List the open markets — several can run at once — with the YES/NO credit pool on each. Every market also takes a <strong>free</strong> community vote on the site (no credits)."
    - cmd: "!market suggest"
      args: "<question>"
      desc: "Propose a YES/NO market — e.g. <code>!market suggest Will we clear the boss tonight?</code>. A mod reviews it before it goes live."
    - cmd: "!duel"
      args: "<@user> <amount>"
      desc: "Challenge another viewer to a coin-flip duel for credits. They reply <code>!duel accept</code> or <code>!duel deny</code>; on accept both stake the wager and the winner takes the whole pot. Expires in 3 minutes."

- group: "Facts & meta"
  commands:
    - cmd: "!fact"
      aliases: "!facts"
      desc: "A random Nikki fun fact. <code>!fact suggest &lt;text&gt;</code> proposes one for approval — approved facts appear on the <a href='/info/'>fun facts page</a>."
    - cmd: "!kennycommands"
      aliases: "!kennybot"
      desc: "This list."

- group: "Mod tools"
  mod: true
  blurb: "For moderators running the show — not needed to play."
  commands:
    - cmd: "!market"
      args: "open <question> | close <#> | resolve <#> <yes|no> | cancel <#>"
      desc: "Run the OKRAMARKET — open a YES/NO market for wagering, close betting on one, resolve it to a winner (parimutuel payout), or cancel and refund every bet. Several can run at once (target each by its number)."
    - cmd: "!market"
      args: "queue | approve <#> | reject <#>"
      desc: "Review viewer market suggestions and promote one to a live market."
    - cmd: "!exp"
      args: "on | off | auto | status"
      desc: "EXP gate control. <code>auto</code> follows the channel's live status."
    - cmd: "!mute"
      args: "on | off | status"
      aliases: "!silence"
      desc: "Silence kennyBot's chat output — it keeps listening and tracking in the background."
    - cmd: "!drop"
      args: "[itemId]"
      desc: "Force a loot drop right now."
    - cmd: "!drops"
      args: "on | off | every <min> | status"
      desc: "Control the automatic chat-drop scheduler."
    - cmd: "!boss"
      args: "set <name> | next"
      desc: "Set a custom boss, or advance to the next scripted season boss."
    - cmd: "!raidnight"
      desc: "Lock the roster and run the battle now."
    - cmd: "!todo"
      args: "add [date] <text> | remove <#> | list"
      desc: "Manage Nikki's <a href='/todo/'>to-do board</a> &mdash; add a dated item (date optional, defaults to today; e.g. <code>!todo add 2026-07-20 order a new mic</code>), cross one off by its number, or list the board. Chat-controlled; the page is read-only."
    - cmd: "!season"
      args: "start <id> | rollover <id>"
      desc: "Start a new season or roll over into the next."
